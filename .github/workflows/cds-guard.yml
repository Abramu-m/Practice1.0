name: CDS Guard

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  guard:
    name: Enforce CDS change policy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect CDS-related changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filters: |
            cds:
              - 'app/Services/CDS/**'
              - 'app/Events/**'
              - 'app/Listeners/**'
              - 'app/Providers/CdsServiceProvider.php'
              - 'app/Models/Cds*.php'
              - 'config/cds.php'
              - 'resources/views/components/cds/**'
              - 'docs/CDS_*.md'
              - 'database/migrations/*cds*'
              - 'database/seeders/*Atc*'

      - name: Determine override
        id: override
        shell: bash
        run: |
          echo "override=false" >> $GITHUB_OUTPUT
          if [[ "${{ github.event_name }}" == "push" ]]; then
            msg="${{ github.event.head_commit.message }}"
            if [[ "$msg" == *"[cds-override]"* ]]; then
              echo "override=true" >> $GITHUB_OUTPUT
            fi
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            title="${{ github.event.pull_request.title }}"
            body="${{ github.event.pull_request.body }}"
            if [[ "$title" == *"[cds-override]"* || "$body" == *"[cds-override]"* ]]; then
              echo "override=true" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Enforce on push
        if: github.event_name == 'push' && steps.filter.outputs.cds == 'true' && steps.override.outputs.override != 'true' && !startsWith(github.ref_name, 'cds/')
        shell: bash
        run: |
          echo "CDS-related files changed on non-cds/* branch: ${{ github.ref_name }}" >&2
          echo "To proceed, push from a cds/* branch or include [cds-override] in the commit message." >&2
          exit 1

      - name: Enforce on pull_request
        if: github.event_name == 'pull_request' && steps.filter.outputs.cds == 'true' && steps.override.outputs.override != 'true' && !startsWith(github.head_ref, 'cds/')
        shell: bash
        run: |
          echo "CDS-related files changed from non-cds/* branch: ${{ github.head_ref }}" >&2
          echo "To proceed, open PR from a cds/* branch or include [cds-override] in the PR title/body." >&2
          exit 1
