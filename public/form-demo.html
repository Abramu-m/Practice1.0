<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investigation Form System Demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css">
</head>
<body>
    <div class="container mt-4">
        <h1>Investigation Form System Demo</h1>
        
        <div class="card">
            <div class="card-header">
                <h5>Test Dynamic Form System</h5>
            </div>
            <div class="card-body">
                <form id="testForm">
                    <div class="mb-3">
                        <label class="form-label">Select Investigation Service:</label>
                        <select class="form-control" id="serviceSelect">
                            <option value="">Select Service...</option>
                            <option value="1">Complete Blood Count (CBC)</option>
                            <option value="2">Chest X-ray</option>
                            <option value="3">Tuberculosis Test</option>
                            <option value="4">CD4 Count</option>
                            <option value="5">Blood Sugar</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Quantity:</label>
                        <input type="text" class="form-control" value="1" min="1">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Priority:</label>
                        <select class="form-control">
                            <option value="routine">Routine</option>
                            <option value="urgent">Urgent</option>
                            <option value="stat">STAT</option>
                        </select>
                    </div>
                    
                    <button type="button" class="btn btn-primary" onclick="testFormSystem()">
                        Order Investigation
                    </button>
                </form>
                
                <div id="result" class="mt-4"></div>
            </div>
        </div>
    </div>

    <script>
        function testFormSystem() {
            const serviceId = $('#serviceSelect').val();
            if (!serviceId) {
                toastr.warning('Please select a service first.');
                return;
            }
            
            // Simulate checking if service requires form
            checkServiceRequiresForm(serviceId, function(requiresForm, formFields) {
                if (requiresForm) {
                    showServiceFormModal(serviceId, formFields, function(formData) {
                        $('#result').html(`
                            <div class="alert alert-success">
                                <h6>Investigation Ordered Successfully!</h6>
                                <p><strong>Service ID:</strong> ${serviceId}</p>
                                <p><strong>Clinical Data:</strong></p>
                                <pre>${JSON.stringify(formData, null, 2)}</pre>
                            </div>
                        `);
                    });
                } else {
                    $('#result').html(`
                        <div class="alert alert-info">
                            <h6>Investigation Ordered Successfully!</h6>
                            <p><strong>Service ID:</strong> ${serviceId}</p>
                            <p><em>No additional form required.</em></p>
                        </div>
                    `);
                }
            });
        }

        function checkServiceRequiresForm(serviceId, callback) {
            // Simulate API call - in real system this would be:
            // $.ajax({ url: `/api/medical-services/${serviceId}/form-check`, ... })
            
            // Mock data for demonstration
            const mockFormData = {
                '1': { requiresForm: false, formFields: [] },
                '2': { 
                    requiresForm: true, 
                    formFields: [
                        { name: 'clinical_indication', label: 'Clinical Indication', type: 'text', required: true, placeholder: 'e.g., Chest pain, shortness of breath' },
                        { name: 'previous_imaging', label: 'Previous Imaging', type: 'select', required: true, options: [
                            { value: 'none', label: 'None' },
                            { value: 'chest_xray', label: 'Previous Chest X-ray' },
                            { value: 'ct_scan', label: 'Previous CT Scan' }
                        ]},
                        { name: 'contrast_needed', label: 'Contrast Required', type: 'checkbox', required: false },
                        { name: 'special_instructions', label: 'Special Instructions', type: 'textarea', required: false, placeholder: 'Any special positioning or breathing instructions' }
                    ]
                },
                '3': { 
                    requiresForm: true, 
                    formFields: [
                        { name: 'test_type', label: 'Test Type', type: 'select', required: true, options: [
                            { value: 'mantoux', label: 'Mantoux Test' },
                            { value: 'genexpert', label: 'GeneXpert' },
                            { value: 'sputum_microscopy', label: 'Sputum Microscopy' }
                        ]},
                        { name: 'symptoms', label: 'Symptoms Present', type: 'textarea', required: true, placeholder: 'List current symptoms (cough, fever, night sweats, etc.)' },
                        { name: 'contact_history', label: 'TB Contact History', type: 'select', required: true, options: [
                            { value: 'no', label: 'No known contact' },
                            { value: 'household', label: 'Household contact' },
                            { value: 'workplace', label: 'Workplace contact' }
                        ]},
                        { name: 'hiv_status', label: 'HIV Status', type: 'select', required: true, options: [
                            { value: 'negative', label: 'Negative' },
                            { value: 'positive', label: 'Positive' },
                            { value: 'unknown', label: 'Unknown' }
                        ]}
                    ]
                },
                '4': { 
                    requiresForm: true, 
                    formFields: [
                        { name: 'hiv_status', label: 'HIV Status', type: 'select', required: true, options: [
                            { value: 'newly_diagnosed', label: 'Newly Diagnosed' },
                            { value: 'known_positive', label: 'Known Positive' },
                            { value: 'monitoring', label: 'Routine Monitoring' }
                        ]},
                        { name: 'art_status', label: 'ART Status', type: 'select', required: true, options: [
                            { value: 'naive', label: 'ART Naive' },
                            { value: 'on_treatment', label: 'On Treatment' },
                            { value: 'defaulted', label: 'Defaulted' }
                        ]},
                        { name: 'last_cd4_count', label: 'Last CD4 Count', type: 'number', required: false, placeholder: 'cells/μL' },
                        { name: 'last_cd4_date', label: 'Last CD4 Date', type: 'date', required: false },
                        { name: 'clinical_stage', label: 'WHO Clinical Stage', type: 'select', required: true, options: [
                            { value: 'stage_1', label: 'Stage 1' },
                            { value: 'stage_2', label: 'Stage 2' },
                            { value: 'stage_3', label: 'Stage 3' },
                            { value: 'stage_4', label: 'Stage 4' }
                        ]}
                    ]
                },
                '5': { requiresForm: false, formFields: [] }
            };
            
            const data = mockFormData[serviceId] || { requiresForm: false, formFields: [] };
            callback(data.requiresForm, data.formFields);
        }

        function showServiceFormModal(serviceId, formFields, callback) {
            if (!formFields || formFields.length === 0) {
                callback({});
                return;
            }

            // Generate form HTML
            let formHtml = '<form id="serviceDataForm">';
            
            formFields.forEach(field => {
                formHtml += `<div class="mb-3">`;
                formHtml += `<label class="form-label">${field.label}`;
                if (field.required) formHtml += ' <span class="text-danger">*</span>';
                formHtml += `</label>`;
                
                if (field.type === 'text' || field.type === 'number' || field.type === 'date') {
                    formHtml += `<input type="${field.type}" class="form-control" name="${field.name}" `;
                    if (field.required) formHtml += 'required ';
                    if (field.placeholder) formHtml += `placeholder="${field.placeholder}" `;
                    formHtml += `/>`;
                } else if (field.type === 'select') {
                    formHtml += `<select class="form-control" name="${field.name}" `;
                    if (field.required) formHtml += 'required ';
                    formHtml += `>`;
                    formHtml += `<option value="">Select ${field.label}...</option>`;
                    if (field.options) {
                        field.options.forEach(option => {
                            formHtml += `<option value="${option.value}">${option.label}</option>`;
                        });
                    }
                    formHtml += `</select>`;
                } else if (field.type === 'textarea') {
                    formHtml += `<textarea class="form-control" name="${field.name}" rows="3" `;
                    if (field.required) formHtml += 'required ';
                    if (field.placeholder) formHtml += `placeholder="${field.placeholder}" `;
                    formHtml += `></textarea>`;
                } else if (field.type === 'checkbox') {
                    formHtml += `<div class="form-check">`;
                    formHtml += `<input class="form-check-input" type="checkbox" name="${field.name}" id="${field.name}" `;
                    if (field.required) formHtml += 'required ';
                    formHtml += `/>`;
                    formHtml += `<label class="form-check-label" for="${field.name}">${field.label}</label>`;
                    formHtml += `</div>`;
                }
                
                formHtml += `</div>`;
            });
            
            formHtml += '</form>';

            // Create modal
            const modalContent = `
                <div class="modal fade" id="serviceFormModal" tabindex="-1">
                    <div class="modal-dialog modal-lg">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title">Additional Clinical Information Required</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                            </div>
                            <div class="modal-body">
                                <div class="alert alert-info">
                                    <i class="fas fa-info-circle"></i> This investigation requires additional clinical information before ordering.
                                </div>
                                ${formHtml}
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                                <button type="button" class="btn btn-primary" onclick="submitServiceForm()">
                                    Submit & Order Investigation
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            // Remove existing modal if any
            $('#serviceFormModal').remove();
            
            // Add modal to DOM
            $('body').append(modalContent);
            
            // Store callback for later use
            window.serviceFormCallback = callback;
            
            // Show modal
            $('#serviceFormModal').modal('show');
        }

        function submitServiceForm() {
            const form = $('#serviceDataForm');
            const formData = {};
            
            // Validate form
            if (!form[0].checkValidity()) {
                form[0].reportValidity();
                return;
            }
            
            // Serialize form data
            const serializedData = form.serializeArray();
            serializedData.forEach(item => {
                formData[item.name] = item.value;
            });
            
            // Handle checkboxes separately
            form.find('input[type="checkbox"]').each(function() {
                formData[$(this).attr('name')] = $(this).is(':checked');
            });
            
            // Hide modal
            $('#serviceFormModal').modal('hide');
            
            // Call callback with form data
            if (window.serviceFormCallback) {
                window.serviceFormCallback(formData);
            }
        }
    </script>
</body>
</html>
