<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template Loading Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="row">
            <div class="col-md-8 offset-md-2">
                <h2>Template Loading Test</h2>
                <p>This page tests the dynamic template loading and JavaScript execution.</p>
                
                <button id="loadTemplateBtn" class="btn btn-primary">Load Simple Template</button>
                <button id="clearTemplateBtn" class="btn btn-secondary">Clear Template</button>
                <button id="testInputBtn" class="btn btn-warning">Test Input Detection</button>
                
                <div id="template_content_container" class="mt-4 border p-3" style="min-height: 200px;">
                    <p class="text-muted">Click "Load Simple Template" to test dynamic loading...</p>
                </div>
                
                <div class="mt-3">
                    <h5>Console Output:</h5>
                    <div id="console_output" class="bg-dark text-light p-3" style="font-family: monospace; height: 200px; overflow-y: auto;">
                        <div>Ready for testing...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Capture console.log for display
        const originalLog = console.log;
        console.log = function(...args) {
            originalLog.apply(console, args);
            const output = document.getElementById('console_output');
            const div = document.createElement('div');
            div.textContent = args.join(' ');
            output.appendChild(div);
            output.scrollTop = output.scrollHeight;
        };

        // Override alert to show in console too
        const originalAlert = window.alert;
        window.alert = function(message) {
            console.log('🚨 ALERT: ' + message);
            return originalAlert(message);
        };

        function executeTemplateScripts(container) {
            // Find all script tags in the loaded template
            const scripts = container.querySelectorAll('script');
            
            console.log(`Found ${scripts.length} script tags to execute`);
            
            scripts.forEach((script, index) => {
                // Create a new script element
                const newScript = document.createElement('script');
                
                // Copy attributes
                for (let attr of script.attributes) {
                    newScript.setAttribute(attr.name, attr.value);
                }
                
                // Copy the script content
                newScript.textContent = script.textContent;
                
                console.log(`Executing script ${index + 1}:`, script.textContent.substring(0, 100) + '...');
                
                // Replace the old script with the new one
                script.parentNode.replaceChild(newScript, script);
            });
            
            console.log('✅ All template scripts executed');
        }

        document.getElementById('loadTemplateBtn').addEventListener('click', function() {
            const container = document.getElementById('template_content_container');
            
            console.log('🔄 Loading simple template...');
            
            // Show loading state
            container.innerHTML = `
                <div class="text-center p-3">
                    <div class="spinner-border spinner-border-sm" role="status">
                        <span class="visually-hidden">Loading template...</span>
                    </div>
                    <p class="mt-2 mb-0">Loading result template...</p>
                </div>
            `;
            
            // Load the template via AJAX (using investigation ID 29 but override with medical service 186)
            const url = `/api/result-template/simple?investigation_id=29&test_medical_service_id=186`;
            
            fetch(url)
                .then(response => {
                    console.log('📡 Template response received:', response.status);
                    return response.text();
                })
                .then(data => {
                    console.log('📝 Template HTML received, length:', data.length);
                    
                    container.innerHTML = `
                        <div class="result-template-container">
                            ${data}
                        </div>
                    `;
                    
                    console.log('🔧 Executing template scripts...');
                    
                    // Execute any scripts in the loaded template
                    executeTemplateScripts(container);
                })
                .catch(error => {
                    console.error('❌ Error loading template:', error);
                    container.innerHTML = `
                        <div class="alert alert-danger">
                            <strong>Error:</strong> ${error.message}
                        </div>
                    `;
                });
        });

        document.getElementById('clearTemplateBtn').addEventListener('click', function() {
            const container = document.getElementById('template_content_container');
            container.innerHTML = '<p class="text-muted">Template cleared.</p>';
            console.log('🧹 Template cleared');
        });

        document.getElementById('testInputBtn').addEventListener('click', function() {
            console.log('🔍 Testing input detection...');
            const container = document.getElementById('template_content_container');
            const valueInputs = container.querySelectorAll('.value-input');
            
            console.log('📊 Found value-input elements in container:', valueInputs.length);
            
            if (valueInputs.length > 0) {
                const firstInput = valueInputs[0];
                console.log('🎯 Testing first input:', firstInput.name, 'current value:', firstInput.value);
                
                // Simulate typing in the first input
                firstInput.value = '5.5';
                
                // Trigger input event manually
                const inputEvent = new Event('input', { bubbles: true });
                firstInput.dispatchEvent(inputEvent);
                
                console.log('✅ Manual input event dispatched');
            } else {
                console.log('❌ No value-input elements found in template');
            }
            
            // Also test global input detection
            const allInputs = document.querySelectorAll('input');
            console.log('🌐 Total inputs on page:', allInputs.length);
        });

        console.log('🚀 Test page loaded and ready');
    </script>
</body>
</html>
