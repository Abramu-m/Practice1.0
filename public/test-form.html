<!DOCTYPE html>
<html>
<head>
    <title>Form Test</title>
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <div class="container mt-5">
        <h2>Form Test</h2>
        
        <div class="row">
            <div class="col-md-6">
                <button class="btn btn-primary" onclick="testForm(5)">Test Form for Chest X-Ray (ID: 5)</button>
            </div>
            <div class="col-md-6">
                <button class="btn btn-success" onclick="testForm(9)">Test Form for Echocardiogram (ID: 9)</button>
            </div>
        </div>
        
        <div id="result" class="mt-3"></div>
    </div>

    <script>
        function testForm(serviceId) {
            // Test the form checking API
            $.ajax({
                url: '/api/medical-services/' + serviceId + '/form-check',
                method: 'GET',
                success: function(response) {
                    console.log('Form check response:', response);
                    $('#result').html('<div class="alert alert-success">✅ <strong>Success!</strong></div><pre>' + JSON.stringify(response, null, 2) + '</pre>');
                    
                    if (response.success && response.requires_form) {
                        $('#result').append('<div class="alert alert-info mt-3">📋 This service requires a form with ' + (response.form_fields.fields ? response.form_fields.fields.length : response.form_fields.length) + ' fields!</div>');
                    } else {
                        $('#result').append('<div class="alert alert-warning mt-3">⚠️ No form required for this service.</div>');
                    }
                },
                error: function(xhr) {
                    console.error('Error:', xhr);
                    $('#result').html('<div class="alert alert-danger">❌ <strong>Error:</strong> ' + xhr.responseText + '</div>');
                }
            });
        }
    </script>
</body>
</html>
